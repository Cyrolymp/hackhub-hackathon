<!DOCTYPE html>
<html th:with="tabTitle='Hackathon'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('g-hackathon')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Hackathon', 'Formulaire')}"></header>

    <section class="content-section">

      <div class="mx-auto" style="max-width: 32rem;">

        <div class="card">
          <div class="card-body">

            <form th:action="@{/hackathon/form}" th:object="${item}" method="post">

              <input type="hidden" th:field="*{idHack}">

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Nom *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{nomHack}" required class="form-control">
                  <div th:errors="*{nomHack}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Thème *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{themeHach}" required class="form-control">
                  <div th:errors="*{themeHach}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Heure de début *</label>
                </div>
                <div class="col">
                  <input type="time" th:field="*{heureDeb}" required class="form-control">
                  <div th:errors="*{heureDeb}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Date de début</label>
                </div>
                <div class="col">
                  <input type="date" th:field="*{dateDeb}" class="form-control">
                  <div th:errors="*{dateDeb}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Date de fin</label>
                </div>
                <div class="col">
                  <input type="date" th:field="*{dateFin}" class="form-control">
                  <div th:errors="*{dateFin}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Lieu *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{lieuHack}" required class="form-control">
                  <div th:errors="*{lieuHack}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Contact</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{contact}" class="form-control">
                  <div th:errors="*{contact}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">ID Organisateur *</label>
                </div>
                <div class="col">
                  <input type="number" th:field="*{idOrganisateur}" required class="form-control">
                  <div th:errors="*{idOrganisateur}" class="text-danger"></div>
                </div>
              </div>


              <div class="mt-4 text-center">
                <input type="submit" class="btn btn-primary" value="Valider">
                <a th:href="@{/hackathon/list}" class="btn btn-outline-secondary">Fermer</a>
              </div>

            </form>

          </div>
        </div>

      </div>

    </section>

  </main>

  <div th:replace="~{_fragments/component :: alert}"></div>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
