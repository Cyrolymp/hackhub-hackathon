<!DOCTYPE html>
<html th:with="tabTitle='Équipe'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('g-equipe')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Équipe', 'Formulaire')}"></header>

    <section class="content-section">

      <div class="mx-auto" style="max-width: 32rem;">

        <div class="card">
          <div class="card-body">

            <form th:action="@{/equipe/form}" th:object="${item}" method="post">

              <input type="hidden" th:field="*{idEquipe}">

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Nom *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{nomEquipe}" required class="form-control">
                  <div th:errors="*{nomEquipe}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Chef d'équipe *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{nomChef}" required class="form-control">
                  <div th:errors="*{nomChef}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Code équipe</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{codeEquipe}" class="form-control">
                  <div th:errors="*{codeEquipe}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">ID Hackathon *</label>
                </div>
                <div class="col">
                  <input type="number" th:field="*{idHack}" required class="form-control">
                  <div th:errors="*{idHack}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">ID Épreuve *</label>
                </div>
                <div class="col">
                  <input type="number" th:field="*{idEpreuve}" required class="form-control">
                  <div th:errors="*{idEpreuve}" class="text-danger"></div>
                </div>
              </div>


              <div class="mt-4 text-center">
                <input type="submit" class="btn btn-primary" value="Valider">
                <a th:href="@{/equipe/list}" class="btn btn-outline-secondary">Fermer</a>
              </div>

            </form>

          </div>
        </div>

      </div>

    </section>

  </main>

  <div th:replace="~{_fragments/component :: alert}"></div>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
