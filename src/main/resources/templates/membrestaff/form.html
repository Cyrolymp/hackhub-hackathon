<!DOCTYPE html>
<html th:with="tabTitle='Membre du staff'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('g-staff')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Membre du staff', 'Formulaire')}"></header>

    <section class="content-section">

      <div class="mx-auto" style="max-width: 32rem;">

        <div class="card">
          <div class="card-body">

            <form th:action="@{/membrestaff/form}" th:object="${item}" method="post">

              <input type="hidden" th:field="*{idMemstaf}">

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Nom *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{nomMenstaf}" required class="form-control">
                  <div th:errors="*{nomMenstaf}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">E-mail *</label>
                </div>
                <div class="col">
                  <input type="email" th:field="*{adresMail}" required class="form-control">
                  <div th:errors="*{adresMail}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Âge</label>
                </div>
                <div class="col">
                  <input type="number" th:field="*{age}" class="form-control">
                  <div th:errors="*{age}" class="text-danger"></div>
                </div>
              </div>


              <div class="mt-4 text-center">
                <input type="submit" class="btn btn-primary" value="Valider">
                <a th:href="@{/membrestaff/list}" class="btn btn-outline-secondary">Fermer</a>
              </div>

            </form>

          </div>
        </div>

      </div>

    </section>

  </main>

  <div th:replace="~{_fragments/component :: alert}"></div>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
