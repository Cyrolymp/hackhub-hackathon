<!DOCTYPE html>
<html th:with="tabTitle='Les hackathons'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('hackathons')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Les hackathons', 'Tous les événements')}"></header>

    <section class="content-section">

      <div th:if="${hackathons.size() > 0}" class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" th:each="h : ${hackathons}">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title" th:text="${h.nomHack}"></h5>
              <h6 class="card-subtitle mb-3" th:text="${h.themeHach}"></h6>
              <p class="card-text mb-1">
                <i class="bi-geo-alt-fill"></i> <span th:text="${h.lieuHack}"></span>
              </p>
              <p class="card-text mb-1">
                <i class="bi-calendar-event"></i>
                <span th:text="${h.dateDeb}"></span> &rarr; <span th:text="${h.dateFin}"></span>
              </p>
              <p class="card-text mb-0" th:if="${h.contact}">
                <i class="bi-envelope"></i> <span th:text="${h.contact}"></span>
              </p>
            </div>
          </div>
        </div>
      </div>

      <div th:unless="${hackathons.size() > 0}" class="my-5 text-center fw-semibold">
        <span>Aucun hackathon publié pour le moment.</span>
      </div>

    </section>

  </main>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
