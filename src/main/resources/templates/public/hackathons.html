<!doctype html>
<html th:with="tabTitle='Les hackathons'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('hackathons')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Les hackathons', 'Découvrez tous les événements')}"></header>

    <section class="content-section">

      <!-- Filtres par catégorie (générés depuis les thèmes) -->
      <div class="filter-bar" id="filter-bar" th:if="${hackathons.size() > 0}"></div>

      <div th:if="${hackathons.size() > 0}" class="row g-3" id="hack-grid">
        <div class="col-12 col-md-6 col-lg-4 hack-col" th:each="h,stat : ${hackathons}"
          th:attr="data-theme=${h.themeHach}">
          <div class="hack-card-dash anim-in"
            th:with="ci=${stat.index % 5}" th:classappend="${ci == 0 ? 'c-purple' : (ci == 1 ? 'c-teal' : (ci == 2 ? 'c-amber' : (ci == 3 ? 'c-pink' : 'c-blue')))}"
            th:style="|animation-delay:${stat.index * 60}ms|">
            <span class="hack-tag" th:text="${h.themeHach}">Thème</span>
            <h6 th:text="${h.nomHack}">Nom</h6>
            <div class="hack-org"><i class="bi bi-geo-alt-fill"></i> <span th:text="${h.lieuHack}">Lieu</span></div>
            <div class="hack-card-meta">
              <span class="meta-pill"><i class="bi bi-calendar-event"></i> <span th:text="${h.dateDeb}">début</span></span>
              <span class="meta-pill"><i class="bi bi-calendar-check"></i> <span th:text="${h.dateFin}">fin</span></span>
            </div>
            <span class="status-badge status-ouvert"><i class="bi bi-unlock-fill"></i> Inscriptions ouvertes</span>
            <div class="d-flex gap-2 mt-2">
              <a th:href="@{/hackathons/{id}(id=${h.idHack})}" class="btn btn-outline-light btn-sm flex-fill">Détail</a>
              <a th:href="@{/inscription}" class="btn btn-primary btn-sm flex-fill">
                <i class="bi bi-person-plus-fill"></i> Participer</a>
            </div>
          </div>
        </div>
      </div>

      <div th:unless="${hackathons.size() > 0}" class="empty-state">
        <i class="bi bi-calendar-x"></i>
        <h3>Aucun hackathon</h3>
        <p>Aucun hackathon n'est publié pour le moment. Revenez bientôt !</p>
      </div>

    </section>

  </main>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

  <script>
    (function () {
      var grid = document.getElementById('hack-grid');
      var bar = document.getElementById('filter-bar');
      if (!grid || !bar) return;
      var cols = Array.prototype.slice.call(grid.querySelectorAll('.hack-col'));
      var themes = [];
      cols.forEach(function (c) {
        var t = c.getAttribute('data-theme');
        if (t && themes.indexOf(t) < 0) themes.push(t);
      });
      function makeBtn(label, theme) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'filter-btn' + (theme === null ? ' active' : '');
        b.textContent = label;
        b.onclick = function () {
          bar.querySelectorAll('.filter-btn').forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          cols.forEach(function (c) {
            c.style.display = (theme === null || c.getAttribute('data-theme') === theme) ? '' : 'none';
          });
        };
        return b;
      }
      bar.appendChild(makeBtn('Tous', null));
      themes.forEach(function (t) { bar.appendChild(makeBtn(t, t)); });
    })();
  </script>

</body>

</html>
