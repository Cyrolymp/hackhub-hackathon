<!doctype html>
<html th:with="tabTitle='Accueil'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Accueil', 'Plateforme de gestion de hackathons')}"></header>

    <section class="content-section">

      <div class="text-center my-4">
        <h1>Bienvenue sur <span style="color:var(--hh-primary);">Hack</span>Hub</h1>
        <p class="text-muted-nav">Trouvez un hackathon, formez votre équipe, relevez le défi.</p>
        <div class="my-4">
          <img class="img-fluid rounded" th:src="@{/img/hackathon.jpg}" style="max-width: 320px;">
        </div>
        <a th:href="@{/hackathons}" class="btn btn-primary">Voir les hackathons</a>
        <a th:href="@{/classement}" class="btn btn-outline-secondary">Classement</a>
      </div>

    </section>

  </main>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
