<!doctype html>
<html th:with="tabTitle=${equipe.nomEquipe}" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('hackathons')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Fiche équipe', 'Composition et notes')}"></header>

    <section class="content-section">

      <div class="row g-4">

        <!-- Infos & participants -->
        <div class="col-12 col-lg-8">
          <div class="card">
            <div class="card-body">
              <div class="hack-detail-banner"></div>
              <h2 class="hack-detail-title" th:text="${equipe.nomEquipe}">Équipe</h2>
              <div class="hack-detail-org">
                <i class="bi bi-person-fill"></i> Chef : <span th:text="${equipe.nomChef}">Chef</span>
              </div>

              <div class="hack-detail-meta">
                <span class="meta-pill" th:if="${hackathon != null}"><i class="bi bi-calendar-event"></i>
                  <span th:text="${hackathon.nomHack}">Hackathon</span></span>
                <span class="meta-pill" th:if="${epreuve != null}"><i class="bi bi-flag-fill"></i>
                  <span th:text="${epreuve.nomEpreuve}">Épreuve</span></span>
                <span class="meta-pill"><i class="bi bi-key-fill"></i> Code :
                  <span class="hack-tag" th:text="${equipe.codeEquipe}">CODE</span></span>
              </div>

              <!-- Participants -->
              <div class="section-heading"><i class="bi bi-people-fill"></i> Participants
                (<span th:text="${participants.size()}">0</span>)</div>
              <table th:if="${participants.size() > 0}" class="table table-sm table-hover align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>Nom</th>
                    <th>Établissement</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="p : ${participants}">
                    <td th:text="${p.nomParticipant}">Nom</td>
                    <td th:text="${p.etablissementParticipant}">Établissement</td>
                  </tr>
                </tbody>
              </table>
              <p th:unless="${participants.size() > 0}" class="text-muted-nav">Aucun participant pour le moment.</p>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="col-12 col-lg-4">

          <div class="card mb-3 text-center">
            <div class="card-body">
              <div class="prize-label" style="text-transform:uppercase; letter-spacing:.5px;">Moyenne</div>
              <div style="font-family:'Space Grotesk',sans-serif; font-size:2.4rem; font-weight:700; color:#fff;"
                th:text="${moyenne != null} ? ${#numbers.formatDecimal(moyenne,1,2)} + ' / 20' : '—'">—</div>
              <div class="text-muted-nav"><span th:text="${notes.size()}">0</span> note(s)</div>
            </div>
          </div>

          <div class="section-heading"><i class="bi bi-star-fill"></i> Notes des juges</div>
          <table th:if="${notes.size() > 0}" class="table table-sm align-middle">
            <tbody>
              <tr th:each="n : ${notes}">
                <td th:text="${n.nomJuge}">Juge</td>
                <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(n.note,1,2)}">0</td>
              </tr>
            </tbody>
          </table>
          <p th:unless="${notes.size() > 0}" class="text-muted-nav">Pas encore notée.</p>

        </div>

      </div>

      <div class="mt-3">
        <a th:if="${hackathon != null}" th:href="@{/hackathons/{id}(id=${hackathon.idHack})}"
          class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Retour au hackathon</a>
        <a th:unless="${hackathon != null}" th:href="@{/hackathons}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i> Retour</a>
      </div>

    </section>

  </main>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
