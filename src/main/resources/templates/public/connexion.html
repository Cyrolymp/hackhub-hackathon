<!doctype html>
<html th:with="tabTitle='Connexion'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Connexion', 'Accédez à votre espace')}"></header>

    <section class="content-section">

      <div class="card mx-auto" style="max-width: 30rem;">
        <div class="card-body">

          <form class="mb-auto" th:action="@{/login}" method="post">

            <!-- E-mail ou pseudo -->
            <div class="row my-2">
              <div class="col-12 col-xl-5">
                <label for="username" class="form-label">E-mail (ou&nbsp;pseudo)</label>
              </div>
              <div class="col">
                <input type="text" id="username" name="username" required autofocus class="form-control">
              </div>
            </div>

            <!-- Mot de passe -->
            <div class="row my-2">
              <div class="col-12 col-xl-5">
                <label for="password" class="col-form-label">Mot de passe</label>
              </div>
              <div class="col">
                <div class="input-group">
                  <input type="password" id="password" th:value="${password}" class="form-control" name="password"
                    required>
                  <button type="button" class="input-group-text btn-link" onclick="showHidehPassword()">
                    <i id="eyeIcon" class="bi-eye"></i></button>
                </div>
              </div>
            </div>

            <!-- Se souvenir de moi -->
            <div class="row my-3">
              <div class="col-6 col-xl-5">
                <label for="remember-me" class="form-check-label">Se souvenir de moi</label>
              </div>
              <div class="col">
                <div class="form-check">
                  <input type="checkbox" id="remember-me" class="form-check-input" name="remember-me">
                </div>
              </div>
            </div>

            <!-- Bouton -->
            <div class="text-center mt-4">
              <input type="submit" class="btn btn-primary" value="Se connecter">
            </div>

          </form>

        </div>
      </div>

    </section>

  </main>

  <div th:replace="~{_fragments/component :: alert}"></div>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

  <script>
    function showHidehPassword() {
      var input = $('#password')
      var icon = $('#eyeIcon')
      if (input.attr('type') == 'password') {
        input.attr('type', 'text')
        icon.removeClass('bi-eye').addClass('bi-eye-slash');
      } else {
        input.attr('type', 'password')
        icon.removeClass('bi-eye-slash').addClass('bi-eye');
      }
    }
  </script>

</body>

</html>
