<!DOCTYPE html>
<html th:with="tabTitle='Classement'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('classement')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Classement des équipes', 'Moyennes attribuées par les juges')}"></header>

    <section class="content-section">

      <div class="mx-auto" style="max-width: 48rem;">

        <table th:if="${classement.size() > 0}" class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th class="text-center">Rang</th>
              <th>Équipe</th>
              <th>Hackathon</th>
              <th class="text-center">Nb notes</th>
              <th class="text-end">Moyenne /20</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="ligne,stat : ${classement}" th:classappend="${stat.count <= 3} ? 'podium'">
              <td class="text-center fw-bold">
                <span th:if="${stat.count == 1}">🥇</span>
                <span th:if="${stat.count == 2}">🥈</span>
                <span th:if="${stat.count == 3}">🥉</span>
                <span th:if="${stat.count > 3}" th:text="${stat.count}"></span>
              </td>
              <td th:text="${ligne.nomEquipe}"></td>
              <td th:text="${ligne.nomHack}"></td>
              <td class="text-center" th:text="${ligne.nbNotes}"></td>
              <td class="text-end fw-semibold"
                th:text="${ligne.moyenne != null} ? ${#numbers.formatDecimal(ligne.moyenne, 1, 2)} : '—'"></td>
            </tr>
          </tbody>
        </table>

        <div th:unless="${classement.size() > 0}" class="my-5 text-center fw-semibold">
          <span>Aucune équipe à classer pour le moment.</span>
        </div>

      </div>

    </section>

  </main>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
