<!DOCTYPE html>
<html th:with="tabTitle='Organisateur'" lang="fr">

<head th:replace="~{_fragments/layout :: head(${tabTitle})}">
  <meta charset="UTF-8">
</head>

<body class="dashboard-body">

  <aside th:replace="~{_fragments/layout :: sidebar('g-organisateur')}"></aside>

  <main class="main-content">

    <header th:replace="~{_fragments/layout :: topbar('Organisateur', 'Formulaire')}"></header>

    <section class="content-section">

      <div class="mx-auto" style="max-width: 32rem;">

        <div class="card">
          <div class="card-body">

            <form th:action="@{/organisateur/form}" th:object="${item}" method="post">

              <input type="hidden" th:field="*{idOrganisateur}">

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Nom *</label>
                </div>
                <div class="col">
                  <input type="text" th:field="*{nomOrg}" required class="form-control">
                  <div th:errors="*{nomOrg}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">E-mail *</label>
                </div>
                <div class="col">
                  <input type="email" th:field="*{adMailOrg}" required class="form-control">
                  <div th:errors="*{adMailOrg}" class="text-danger"></div>
                </div>
              </div>

              <div class="row my-3">
                <div class="col-12 col-xl-4">
                  <label class="col-form-label">Compte associé</label>
                </div>
                <div class="col">
                  <select th:field="*{idCompte}" class="form-select">
                    <option value="">-- Aucun --</option>
                    <option th:each="c : ${comptes}" th:value="${c.idCompte}"
                      th:text="${c.pseudo + ' (' + c.email + ')'}"></option>
                  </select>
                  <div th:errors="*{idCompte}" class="text-danger"></div>
                </div>
              </div>


              <div class="mt-4 text-center">
                <input type="submit" class="btn btn-primary" value="Valider">
                <a th:href="@{/organisateur/list}" class="btn btn-outline-secondary">Fermer</a>
              </div>

            </form>

          </div>
        </div>

      </div>

    </section>

  </main>

  <div th:replace="~{_fragments/component :: alert}"></div>

  <th:block th:replace="~{_fragments/layout :: bottom-scripts}"></th:block>

</body>

</html>
