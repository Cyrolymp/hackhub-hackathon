# =============================================
#  HackHub — Application Properties
# =============================================

# Server
server.port=8080
spring.application.name=hackhub-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hackhub_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=HackHubSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025!
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# Logging
logging.level.com.hackhub=INFO
logging.level.org.springframework.security=WARN
